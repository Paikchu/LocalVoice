name: LocalVoice
options:
  bundleIdPrefix: com.localvoice
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: 3.31.3
  HuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
targets:
  LocalVoiceCore:
    type: framework
    platform: macOS
    sources:
      - Sources/LocalVoiceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localvoice.core
        GENERATE_INFOPLIST_FILE: YES
  LocalVoice:
    type: application
    platform: macOS
    sources:
      - Sources/LocalVoiceApp
    dependencies:
      - target: LocalVoiceCore
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: HuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
    info:
      path: Sources/LocalVoiceApp/Info.plist
      properties:
        CFBundleDisplayName: LocalVoice
        LSUIElement: true
        NSMicrophoneUsageDescription: LocalVoice 需要麦克风权限来进行本地语音识别。
        NSSpeechRecognitionUsageDescription: LocalVoice 需要语音识别权限来实时转换你的语音。
    entitlements:
      path: Sources/LocalVoiceApp/LocalVoice.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localvoice.app
        PRODUCT_NAME: LocalVoice
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
  LocalVoiceCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/LocalVoiceCoreTests
    dependencies:
      - target: LocalVoiceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localvoice.core-tests
  LocalVoiceBenchmark:
    type: tool
    platform: macOS
    sources:
      - Tools/LocalVoiceBenchmark
      - Sources/LocalVoiceApp/MLXLanguageModelService.swift
    dependencies:
      - target: LocalVoiceCore
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: HuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
    settings:
      base:
        PRODUCT_NAME: LocalVoiceBenchmark
schemes:
  LocalVoice:
    build:
      targets:
        LocalVoice: all
        LocalVoiceCoreTests: [test]
    test:
      targets:
        - LocalVoiceCoreTests
  LocalVoiceBenchmark:
    build:
      targets:
        LocalVoiceBenchmark: all
    run:
      config: Release
