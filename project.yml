name: LocalVoice
options:
  bundleIdPrefix: com.localvoice
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development
    DEVELOPMENT_TEAM: FB4M276Q93
    ENABLE_HARDENED_RUNTIME: YES
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.18.0
targets:
  LocalVoiceCore:
    type: framework
    platform: macOS
    sources:
      - Sources/LocalVoiceCore
    resources:
      - Sources/LocalVoiceCore/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localvoice.core
        GENERATE_INFOPLIST_FILE: YES
  LocalVoice:
    type: application
    platform: macOS
    sources:
      - Sources/LocalVoiceApp
    dependencies:
      - target: LocalVoiceCore
      - sdk: FoundationModels.framework
      - package: WhisperKit
        product: WhisperKit
    info:
      path: Sources/LocalVoiceApp/Info.plist
      properties:
        CFBundleDisplayName: LocalVoice
        CFBundleShortVersionString: "1.0.4"
        CFBundleVersion: "5"
        LSUIElement: true
        NSMicrophoneUsageDescription: LocalVoice 需要麦克风权限来进行本地语音识别。
        NSSpeechRecognitionUsageDescription: LocalVoice 需要语音识别权限来实时转换你的语音。
    entitlements:
      path: Sources/LocalVoiceApp/LocalVoice.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.localvoice.app
        PRODUCT_NAME: LocalVoice
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
  LocalVoiceCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/LocalVoiceCoreTests
    dependencies:
      - target: LocalVoiceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localvoice.core-tests
  LocalVoiceBenchmark:
    type: tool
    platform: macOS
    sources:
      - Tools/LocalVoiceBenchmark
      - Sources/LocalVoiceApp/FoundationModelBackend.swift
    dependencies:
      - target: LocalVoiceCore
      - sdk: FoundationModels.framework
    settings:
      base:
        CODE_SIGNING_ALLOWED: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path @executable_path/../Frameworks $(BUILT_PRODUCTS_DIR)"
        PRODUCT_NAME: LocalVoiceBenchmark
  LocalVoiceQualityBench:
    type: application
    platform: macOS
    sources:
      - Tools/LocalVoiceQualityBench
      - Sources/LocalVoiceApp/FoundationModelBackend.swift
    dependencies:
      - target: LocalVoiceCore
      - sdk: AVFoundation.framework
      - sdk: FoundationModels.framework
      - sdk: Speech.framework
    settings:
      base:
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: LocalVoiceQualityBench reads local audio files for benchmark scoring.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: LocalVoiceQualityBench needs speech recognition access to score local audio fixtures.
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path @executable_path/../Frameworks $(BUILT_PRODUCTS_DIR)"
        PRODUCT_BUNDLE_IDENTIFIER: com.localvoice.qualitybench
        PRODUCT_NAME: LocalVoiceQualityBench
schemes:
  LocalVoice:
    build:
      targets:
        LocalVoice: all
        LocalVoiceCoreTests: [test]
    test:
      targets:
        - LocalVoiceCoreTests
  LocalVoiceBenchmark:
    build:
      targets:
        LocalVoiceBenchmark: all
    run:
      config: Release
  LocalVoiceQualityBench:
    build:
      targets:
        LocalVoiceQualityBench: all
    run:
      config: Release
